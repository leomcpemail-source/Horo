<style>

<script>
// ===== CONFIG =====
const GROQ_MODEL = 'llama-3.3-70b-versatile';
const LS_KEY = 'groq_api_key_y2569';

// ===== KEY =====
function saveKey(){
  const v = document.getElementById('keyInput').value.trim();
  if(!v.startsWith('gsk_') || v.length < 20){ document.getElementById('setupErr').style.display='block'; return; }

}
function changeKey(){ localStorage.removeItem(LS_KEY); location.reload(); }
document.getElementById('keyInput').addEventListener('keydown', e => { if(e.key==='Enter') saveKey(); });
window.addEventListener('load', () => {
  const s = localStorage.getItem(LS_KEY);
  if(s && s.startsWith('gsk_')){ GROQ_KEY=s; document.getElementById('setupScreen').style.display='none'; document.getElementById('app').style.display='block'; initApp(); }
});

// ===== NATAL & ENGINE =====
const NATAL={asc:271.97,sun:300.80,moon:298.47,mercury:282.66,venus:345.83,mars:350.31,jupiter:266.75,saturn:236.41,rahu:55.26};
const SIGNS=['เมษ','พฤษภ','เมถุน','กรกฎ','สิงห์','กันย์','ตุลย์','พิจิก','ธนู','มกร','กุมภ์','มีน'];
const PNAMES={sun:'พระอาทิตย์',moon:'พระจันทร์',mercury:'พระพุธ',venus:'พระศุกร์',mars:'พระอังคาร',jupiter:'พระพฤหัส',saturn:'พระเสาร์',rahu:'พระราหู',asc:'ลัคนา'};
const ANAMES={Conjunction:'โคจรทับ',Opposition:'โคจรเผชิญหน้า',Trine:'โคจรเสริม',Square:'โคจรขัด',Sextile:'โคจรหนุน',Quincunx:'โคจรกดดันเล็กน้อย'};
const MONTH_FULL=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DOW_SHORT=['อา','จ','อ','พ','พฤ','ศ','ส'];
const DOW_FULL=['วันอาทิตย์','วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์','วันเสาร์'];

const DM={sun:0.9856,moon:13.1764,mercury:1.3833,venus:1.2,mars:0.524,jupiter:0.0831,saturn:0.0334,rahu:-0.0529};
const B26={sun:280.5,moon:72.3,mercury:270.1,venus:315.4,mars:101.2,jupiter:58.8,saturn:345.6,rahu:11.2};
const MR=[{s:50,e:72},{s:166,e:189},{s:281,e:305}];
const VR=[{s:1,e:90}]; const JR=[{s:1,e:35}];

function getDOY(d){ return Math.floor((d - new Date(2026,0,1))/86400000)+1; }
function signOf(deg){ return SIGNS[Math.floor(((deg%360)+360)%360/30)]; }
function tpos(p,doy){
  let b=B26[p],m=DM[p];
  if(p==='mercury') MR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-m*0.8;});
  if(p==='venus')   VR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-0.5;});
  if(p==='jupiter') JR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-0.03;});
  return((b+m*(doy-1))%360+360)%360;
}
function adiff(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
const ASPS=[{n:'Conjunction',d:0,o:6,w:1},{n:'Opposition',d:180,o:6,w:-1},{n:'Trine',d:120,o:5,w:0.7},{n:'Square',d:90,o:5,w:-0.7},{n:'Sextile',d:60,o:4,w:0.4},{n:'Quincunx',d:150,o:3,w:-0.2}];
const PW={sun:1,moon:1.5,mercury:0.5,venus:0.8,mars:0.7,jupiter:1.2,saturn:1,rahu:0.6};
const NP=['asc','sun','moon','mercury','venus','mars','jupiter','saturn'];

function computeDay(doy){
  const asp=[],tr={};
  ['sun','moon','mercury','venus','mars','jupiter','saturn','rahu'].forEach(p=>{tr[p]=tpos(p,doy);});
  let raw=0;
  ['saturn','jupiter','mars','rahu'].forEach(tp=>{
    NP.forEach(np=>{
      if(NATAL[np]==null)return;
      const df=adiff(tr[tp],NATAL[np]);
      for(const a of ASPS){if(Math.abs(df-a.d)<=a.o){const st=1-Math.abs(df-a.d)/a.o,sc=a.w*PW[tp]*st*2;raw+=sc;asp.push({transit:tp,natal:np,aspName:a.n,weight:a.w,strength:st,score:sc,slow:true});break;}}
    });
  });
  ['sun','moon','venus','mercury'].forEach(tp=>{
    ['sun','moon','asc','jupiter'].forEach(np=>{
      if(NATAL[np]==null)return;
      const df=adiff(tr[tp],NATAL[np]);
      for(const a of ASPS){if(Math.abs(df-a.d)<=a.o){const st=1-Math.abs(df-a.d)/a.o,sc=a.w*PW[tp]*st*0.8;raw+=sc;asp.push({transit:tp,natal:np,aspName:a.n,weight:a.w,strength:st,score:sc,slow:false});break;}}
    });
  });
  // Map to 1-10
  const clamped=Math.max(-8,Math.min(8,raw));
  const score10=Math.max(1,Math.min(10,Math.round(((clamped+8)/16)*9)+1));
  return{score:score10,aspects:asp,transits:tr,raw};
}

// ===== WEEK STATE =====
let weekOffset=0, selectedDate=new Date();
selectedDate.setHours(0,0,0,0);

function getWeekDates(offset){
  const now=new Date(); now.setHours(0,0,0,0);
  const dow=now.getDay();
  const monday=new Date(now); monday.setDate(now.getDate()-dow+(dow===0?-6:1));
  monday.setDate(monday.getDate()+offset*7);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d);}
  return days;
}

function setWeek(offset){
  weekOffset=offset;
  document.getElementById('btnThisWeek').className='week-btn'+(offset===0?' active':'');
  document.getElementById('btnNextWeek').className='week-btn'+(offset===1?' active':'');
  renderDayPicker();
}

function renderDayPicker(){
  const days=getWeekDates(weekOffset);
  const today=new Date(); today.setHours(0,0,0,0);
  const first=days[0], last=days[6];
  document.getElementById('weekRangeLabel').textContent=
    `${first.getDate()} ${MONTH_FULL[first.getMonth()].slice(0,3)} – ${last.getDate()} ${MONTH_FULL[last.getMonth()].slice(0,3)}`;

  const picker=document.getElementById('dayPicker');
  picker.innerHTML='';
  days.forEach(d=>{
    const isActive=d.getTime()===selectedDate.getTime();
    const isToday=d.getTime()===today.getTime();
    const doy=getDOY(d);
    const {score}=computeDay(doy);
    const item=document.createElement('div');
    item.className='day-item'+(isActive?' active':isToday?' today-mark':'');
    item.innerHTML=`<div class="day-dow">${DOW_SHORT[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="day-score-dot" title="${score}/10"></div>`;
    item.onclick=()=>{ selectedDate=new Date(d); renderDayPicker(); loadDashboard(); };
    picker.appendChild(item);
  });
  // Auto scroll to selected
  setTimeout(()=>{
    const items=picker.querySelectorAll('.day-item');
    const active=picker.querySelector('.day-item.active');
    if(active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },50);
}

// ===== DONUT CHART =====
function buildDonut(score, size=88){
  const pct=score/10;
  const r=36, cx=44, cy=44;
  const circ=2*Math.PI*r;
  const dash=pct*circ;
  const color=score>=7?'#f5a623':score>=5?'#f5a623':'#e74c3c';
  return `<svg width="${size}" height="${size}" viewBox="0 0 88 88">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"
      style="transition:stroke-dasharray 0.8s ease"/>
  </svg>`;
}

// ===== SCORE META =====
function scoreMeta(s){
  if(s>=9) return{label:'โดดเด่น',lvCls:'lv-good'};
  if(s>=7) return{label:'ดีมาก',lvCls:'lv-good'};
  if(s>=6) return{label:'ดี',lvCls:'lv-good'};
  if(s>=5) return{label:'ธรรมดา',lvCls:'lv-norm'};
  if(s>=4) return{label:'แย่',lvCls:'lv-warn'};
  return{label:'แย่มาก',lvCls:'lv-warn'};
}
function lvClass(l){ return l==='ดีมาก'||l==='ดี'||l==='โดดเด่น'?'lv-good':l==='ธรรมดา'?'lv-norm':l==='ระวัง'||l==='แย่'||l==='แย่มาก'?'lv-warn':'lv-ok'; }

// ===== PROMPT =====
function buildPrompt(date, score, aspects, transits){
  const doy=getDOY(date);
  const meta=scoreMeta(score);
  const tDesc=Object.entries(transits).map(([p,deg])=>`${PNAMES[p]||p}ในราศี${signOf(deg)}`).join(', ');
  const aDesc=aspects.length===0?'ไม่มีปฏิสัมพันธ์สำคัญ':
    aspects.sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).slice(0,5)
    .map(a=>`${PNAMES[a.transit]}${ANAMES[a.aspName]}${PNAMES[a.natal]}(${a.weight>0?'หนุน':'กดดัน'} ${a.strength>0.7?'แม่น':'อ่อน'} ${a.slow?'ยาว':'สั้น'})`).join(', ');

  return `คุณเป็นโหรผู้เชี่ยวชาญ วิเคราะห์ดวงชะตารายวันเป็นภาษาไทยธรรมดา สั้นกระชับ เข้าใจง่าย

// ===== API =====
const cache={};

async function fetchReading(date){
  const k=date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate();
  if(cache[k]) return cache[k];
  const doy=getDOY(date);
  const {score,aspects,transits}=computeDay(doy);
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
    body:JSON.stringify({model:GROQ_MODEL,temperature:0.7,max_tokens:1400,messages:[{role:'user',content:buildPrompt(date,score,aspects,transits)}]})
  });
  if(!res.ok) throw new Error('Groq '+res.status);
  const data=await res.json();
  const text=data.choices[0].message.content.trim();
  const match=text.match(/\{[\s\S]*\}/);
  const r=JSON.parse(match?match[0]:text);
  r._score=score;
  cache[k]=r;
  return r;
}

// ===== TAG CLASS =====
function tagClass(t){
  const m={
    'งานหนัก':'t-work','งานเยอะ':'t-work','ประชุมเยอะ':'t-work',
    'เครียด':'t-warn','ระวัง':'t-warn','ปากเสีย':'t-warn','ต้องระวังคำพูด':'t-warn',
    'ระวังเจ้านาย':'t-boss','เจ้านายจับตา':'t-boss','โยกย้าย':'t-boss','เจ้านายหนุน':'t-boss',
    'โชคดี':'t-good','เงินเข้า':'t-good','ดวงดี':'t-good','คนรักดี':'t-good',
    'ป่วยได้':'t-warn','ระวังอุบัติเหตุ':'t-warn',
  };
  return m[t]||'';
}

// ===== LOAD DASHBOARD =====
async function loadDashboard(){
  const d=selectedDate;
  const doy=getDOY(d);
  const {score}=computeDay(doy);
  const meta=scoreMeta(score);

  const body=document.getElementById('dashBody');
  body.innerHTML=`
    <!-- Hero Card -->
    <div class="hero-card">
      <div class="hero-top">
        <div class="hero-title">ดวงชะตาวันนี้</div>
        <div class="hero-date">${d.getDate()} ${MONTH_FULL[d.getMonth()].slice(0,3)} · ${DOW_FULL[d.getDay()].replace('วัน','')}</div>
      </div>
      <div class="hero-main">
        <div class="hero-text">
          <div class="hero-score-label">คะแนนดวงรวม</div>
          <div class="hero-score-big">${score}<span>/10</span></div>
          <div class="hero-status">${meta.label}</div>
        </div>
        <div class="donut-wrap">
          ${buildDonut(score)}
          <div class="donut-center">
            <div class="donut-pct">${score}</div>
            <div class="donut-pct-lbl">/ 10</div>
          </div>
        </div>
      </div>
      <div class="hero-tags" id="heroTags">
        <div class="hero-tag">กำลังโหลด...</div>
      </div>
    </div>

    <div class="sec-title">ดวงแต่ละด้าน</div>

    <div class="area-grid" id="areaGrid">
      <div class="dash-loading">
        <div class="dash-spinner"></div>
        กำลังวิเคราะห์ดวง...
      </div>
    </div>
  `;

  try {
    const r = await fetchReading(d);

    // Update tags
    const tagsEl=document.getElementById('heroTags');
    if(tagsEl && r.tags){
      tagsEl.innerHTML=r.tags.map(t=>`<div class="hero-tag ${tagClass(t)}">${t}</div>`).join('');
    }

    // Build area grid
    const grid=document.getElementById('areaGrid');
    if(!grid) return;

    let html='';

    // Boss card (featured)
    if(r.boss){
      html+=`<div class="area-tile featured" onclick="openDetail('👔','เจ้านาย / ผู้มีอำนาจ','${r.boss.level}','boss',null)">
        <div class="area-tile-icon">👔</div>
        <div>
          <div class="area-tile-title">เจ้านาย / ผู้มีอำนาจ</div>
          <div class="area-tile-summary">${r.boss.summary||r.boss.body.slice(0,40)+'...'}</div>
          <div class="area-tile-level ${lvClass(r.boss.level)}">${r.boss.level}</div>
        </div>
        <div class="area-tile-arrow">→</div>
      </div>`;
    }

    // Area tiles
    if(r.areas){
      r.areas.forEach(a=>{
        const summaryShort=(a.summary||a.body).slice(0,32)+(a.body.length>32?'...':'');
        html+=`<div class="area-tile" onclick="openDetail('${a.icon}','${a.title}','${a.level}','area','${a.title}')">
          <div class="area-tile-icon">${a.icon}</div>
          <div class="area-tile-title">${a.title}</div>
          <div class="area-tile-summary">${summaryShort}</div>
          <div class="area-tile-level ${lvClass(a.level)}">${a.level}</div>
          <div class="area-tile-arrow">→</div>
        </div>`;
      });
    }

    // Do/Don't at bottom
    html+=`<div class="area-tile" onclick="openDetail('✅','สิ่งที่ควรทำ-หลีกเลี่ยง','ธรรมดา','dodont',null)">
      <div class="area-tile-icon">📋</div>
      <div class="area-tile-title">ควรทำ / หลีกเลี่ยง</div>
      <div class="area-tile-summary">คำแนะนำประจำวัน</div>
      <div class="area-tile-level lv-norm">ดูรายละเอียด</div>
      <div class="area-tile-arrow">→</div>
    </div>`;

    grid.innerHTML=html;
    // Store reading for detail page
    window._currentReading=r;
    window._currentDate=d;

  } catch(e) {
    const grid=document.getElementById('areaGrid');
    if(grid) grid.innerHTML=`<div class="ai-err-card"><p>⚠️ โหลดไม่ได้ ตรวจสอบ API Key</p><button class="retry-btn" onclick="loadDashboard()">🔄 ลองใหม่</button></div>`;
  }
}

// ===== DETAIL PAGE =====
function openDetail(icon, title, level, type, areaTitle){
  const r=window._currentReading;
  const d=window._currentDate;
  if(!r) return;

  document.getElementById('detailIcon').textContent=icon;
  document.getElementById('detailTitle').textContent=title;
  const badge=document.getElementById('detailBadge');
  badge.textContent=level;
  badge.className='detail-level-badge '+
    (level==='ดีมาก'||level==='ดี'?'lv-good':level==='ธรรมดา'?'lv-norm':'lv-warn');
  badge.style.background=level==='ดีมาก'||level==='ดี'?'rgba(46,204,113,0.2)':
    level==='ธรรมดา'?'rgba(122,154,165,0.2)':'rgba(231,76,60,0.2)';
  badge.style.color=level==='ดีมาก'||level==='ดี'?'#27ae60':
    level==='ธรรมดา'?'#5a8090':'#e74c3c';

  let bodyHtml='';

  if(type==='boss' && r.boss){
    bodyHtml+=`<div class="boss-detail-card">
      <h4>👔 สถานการณ์กับเจ้านาย</h4>
      <p>${r.boss.body}</p>
    </div>`;
    bodyHtml+=`<div class="detail-card"><h4>💡 คำแนะนำ</h4><p>ในวันที่ดวงเจ้านายกดดัน ควรระมัดระวังการแสดงความคิดเห็นโดยตรง และหมั่นรายงานความคืบหน้าก่อนที่จะถูกถาม แสดงให้เห็นว่าคุณทำงานอยู่เสมอ</p></div>`;
  }

  else if(type==='area' && r.areas){
    const area=r.areas.find(a=>a.title===areaTitle);
    if(area){
      bodyHtml+=`<div class="detail-card"><h4>${area.icon} ${area.title}</h4><p>${area.body}</p></div>`;
    }
  }

  else if(type==='dodont'){
    bodyHtml+=`<div class="do-dont-row">
      <div class="do-card"><h5>✅ ควรทำ</h5><ul>${(r.do||[]).map(i=>'<li>'+i+'</li>').join('')}</ul></div>
      <div class="dont-card"><h5>⛔ หลีกเลี่ยง</h5><ul>${(r.dont||[]).map(i=>'<li>'+i+'</li>').join('')}</ul></div>
    </div>`;
  }

  // Overall always shown
  bodyHtml+=`<div class="detail-card"><h4>🌟 ภาพรวมวันที่ ${d.getDate()} ${MONTH_FULL[d.getMonth()]}</h4><p>${r.overall||''}</p></div>`;

  document.getElementById('detailBody').innerHTML=bodyHtml;

  // Switch page
  document.getElementById('pageDash').classList.remove('active');
  document.getElementById('pageDetail').classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('pageDetail').classList.remove('active');
  document.getElementById('pageDash').classList.add('active');
}

  if(today.getFullYear()!==2026){ selectedDate=new Date(2026,0,1); weekOffset=0; }

}
