<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ดวงรายวัน Y · ปี 2569</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Cinzel:wght@600&display=swap');

:root {
–bg: #080612;
–surface: #100e22;
–card: #161230;
–border: rgba(180,150,80,0.15);
–gold: #c9a84c;
–gold2: #e8d08a;
–muted: #7060a0;
–text: #ddd8f0;
–score5: #e74c3c;
–score4: #e67e22;
–score3: #f1c40f;
–score6: #2ecc71;
–score7: #1abc9c;
–score8: #3498db;
–score9: #9b59b6;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Sarabun’, sans-serif;
min-height: 100vh;
overscroll-behavior: none;
}

/* Header */
.hdr {
background: linear-gradient(180deg, #120f28 0%, var(–bg) 100%);
border-bottom: 1px solid var(–border);
padding: 20px 16px 16px;
text-align: center;
position: sticky;
top: 0;
z-index: 100;
backdrop-filter: blur(10px);
}

.hdr-title {
font-family: ‘Cinzel’, serif;
font-size: 18px;
color: var(–gold2);
letter-spacing: 2px;
text-shadow: 0 0 20px rgba(201,168,76,0.4);
}

.hdr-sub {
font-size: 11px;
color: var(–muted);
margin-top: 4px;
letter-spacing: 1px;
}

/* Month Tabs */
.month-tabs {
display: flex;
overflow-x: auto;
gap: 6px;
padding: 12px 16px;
background: var(–surface);
border-bottom: 1px solid var(–border);
scrollbar-width: none;
-ms-overflow-style: none;
position: sticky;
top: 74px;
z-index: 99;
}
.month-tabs::-webkit-scrollbar { display: none; }

.mtab {
flex-shrink: 0;
padding: 6px 14px;
border-radius: 20px;
border: 1px solid var(–border);
background: var(–card);
color: var(–muted);
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}
.mtab.active {
background: var(–gold);
color: #080612;
border-color: var(–gold);
}

/* Summary bar */
.summary-bar {
display: flex;
gap: 8px;
padding: 10px 16px;
overflow-x: auto;
scrollbar-width: none;
background: var(–bg);
}
.summary-bar::-webkit-scrollbar { display: none; }

.sbar-item {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 5px;
font-size: 11px;
color: var(–muted);
}
.sbar-dot {
width: 8px; height: 8px;
border-radius: 50%;
}

/* Calendar Grid */
.cal-wrap {
padding: 8px 12px 120px;
}

.cal-header {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
margin-bottom: 4px;
}
.cal-dow {
text-align: center;
font-size: 10px;
color: var(–muted);
padding: 4px 0;
font-weight: 600;
}
.cal-dow:first-child { color: #e74c3c; }
.cal-dow:last-child { color: #3498db; }

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
}

.cal-cell {
aspect-ratio: 1;
border-radius: 8px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
cursor: pointer;
position: relative;
transition: transform 0.15s, box-shadow 0.15s;
border: 1px solid transparent;
min-height: 42px;
}
.cal-cell:active { transform: scale(0.92); }
.cal-cell.today { border-color: var(–gold) !important; }
.cal-cell.selected { border-color: #fff !important; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }
.cal-cell.empty { background: transparent; cursor: default; }

.cal-day {
font-size: 13px;
font-weight: 700;
line-height: 1;
}
.cal-score {
font-size: 9px;
margin-top: 2px;
font-weight: 600;
opacity: 0.85;
}
.cal-bar {
position: absolute;
bottom: 3px;
left: 4px; right: 4px;
height: 2px;
border-radius: 2px;
opacity: 0.7;
}

/* Score colors */
.s1 { background: #1a0a0a; color: #e74c3c; }
.s2 { background: #1a1108; color: #e67e22; }
.s3 { background: #1a1a08; color: #d4ac0d; }
.s4 { background: #0d1a0d; color: #27ae60; }
.s5 { background: #081a14; color: #1abc9c; }
.s6 { background: #080f1a; color: #2e86c1; }
.s7 { background: #10081a; color: #8e44ad; }

/* Detail Panel */
.detail-panel {
position: fixed;
bottom: 0; left: 0; right: 0;
background: var(–surface);
border-top: 1px solid var(–border);
border-radius: 20px 20px 0 0;
padding: 0 0 env(safe-area-inset-bottom, 16px);
transform: translateY(100%);
transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 200;
max-height: 80vh;
overflow-y: auto;
}
.detail-panel.open { transform: translateY(0); }

.panel-handle {
width: 36px; height: 4px;
background: var(–border);
border-radius: 2px;
margin: 12px auto 0;
}

.panel-content { padding: 16px 16px 24px; }

.panel-date {
font-family: ‘Cinzel’, serif;
font-size: 15px;
color: var(–gold2);
margin-bottom: 4px;
}

.panel-weekday {
font-size: 12px;
color: var(–muted);
margin-bottom: 14px;
}

.score-display {
display: flex;
align-items: center;
gap: 14px;
background: var(–card);
border-radius: 14px;
padding: 14px 16px;
margin-bottom: 14px;
border: 1px solid var(–border);
}

.score-circle {
width: 60px; height: 60px;
border-radius: 50%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
flex-shrink: 0;
border: 2px solid currentColor;
}

.score-num {
font-family: ‘Cinzel’, serif;
font-size: 24px;
font-weight: 700;
line-height: 1;
}

.score-max { font-size: 10px; opacity: 0.6; }

.score-label {
font-size: 18px;
font-weight: 700;
margin-bottom: 4px;
}

.score-desc {
font-size: 12px;
color: var(–muted);
line-height: 1.5;
}

/* Aspect list */
.aspect-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.aspect-item {
background: var(–card);
border-radius: 10px;
padding: 10px 12px;
border: 1px solid var(–border);
display: flex;
gap: 10px;
align-items: flex-start;
}

.asp-icon {
font-size: 18px;
flex-shrink: 0;
margin-top: 1px;
}

.asp-body { flex: 1; }
.asp-title { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.asp-desc { font-size: 11px; color: var(–muted); line-height: 1.6; }

.asp-pos { color: #2ecc71; }
.asp-neg { color: #e74c3c; }
.asp-neu { color: #f1c40f; }

/* Advice box */
.advice-box {
background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
border: 1px solid rgba(201,168,76,0.2);
border-radius: 12px;
padding: 12px 14px;
}

.advice-box h4 {
font-size: 12px;
color: var(–gold);
margin-bottom: 6px;
display: flex;
align-items: center;
gap: 6px;
}

.advice-box p {
font-size: 12px;
color: var(–muted);
line-height: 1.7;
}

/* Overlay */
.overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.5);
z-index: 190;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: auto; }

/* Month label */
.month-label {
font-family: ‘Cinzel’, serif;
font-size: 13px;
color: var(–gold);
letter-spacing: 2px;
margin: 16px 0 10px;
padding-bottom: 6px;
border-bottom: 1px solid var(–border);
}

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Y · ดวงรายวัน 2569</div>
  <div class="hdr-sub">21 ม.ค. 2528 · ลัคนามกร · คลิกวันเพื่อดูรายละเอียด</div>
</div>

<div class="month-tabs" id="monthTabs"></div>

<div class="summary-bar">
  <div class="sbar-item"><div class="sbar-dot" style="background:#e74c3c"></div>แย่มาก</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#e67e22"></div>แย่</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#d4ac0d"></div>ธรรมดา</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#27ae60"></div>ดี</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#1abc9c"></div>ดีมาก</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#2e86c1"></div>ดีเยี่ยม</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#8e44ad"></div>โดดเด่น</div>
</div>

<div class="cal-wrap" id="calWrap"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="detail-panel" id="detailPanel">
  <div class="panel-handle"></div>
  <div class="panel-content" id="panelContent"></div>
</div>

<script>
// =============================================
// NATAL DATA (astro.com, Placidus, Tropical)
// =============================================
const NATAL = {
  asc:     271.97,  // มกร 1°58'
  sun:     300.80,  // กุมภ์ 0°48'
  moon:    298.47,  // มกร 28°28'
  mercury: 282.66,  // มกร 12°40'
  venus:   345.83,  // มีน 17°50'
  mars:    350.31,  // มีน 20°18'
  jupiter: 266.75,  // ธนู 26°45'
  saturn:  236.41,  // พิจิก 26°24'
  uranus:  256.42,  // ธนู 16°25'
  neptune: 272.20,  // มกร 2°12'
  pluto:   244.67,  // พิจิก 4°40'
  rahu:     55.26,  // พฤษภ 25°15'
};

const MONTH_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const MONTH_FULL = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DOW_TH = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const DOW_FULL = ['วันอาทิตย์','วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์','วันเสาร์'];

// =============================================
// TRANSIT PLANET POSITIONS (simplified orbital)
// Jan 1 2026 baseline + daily motion
// =============================================

// Mean daily motion (degrees/day)
const DAILY_MOTION = {
  sun:      0.9856,
  moon:    13.1764,
  mercury:  1.3833,  // mean (retrograde handled)
  venus:    1.2000,
  mars:     0.5240,
  jupiter:  0.0831,
  saturn:   0.0334,
  rahu:    -0.0529,  // retrograde
};

// Jan 1 2026 00:00 UTC positions (approximate)
const BASE_2026 = {
  sun:      280.5,   // Capricorn 10°
  moon:      72.3,   // Taurus 12°
  mercury:  270.1,   // Sagittarius 0°
  venus:    315.4,   // Aquarius 15°
  mars:     101.2,   // Cancer 11°
  jupiter:   58.8,   // Gemini 28° (retrograde period)
  saturn:   345.6,   // Pisces 15°
  rahu:      11.2,   // Aries 11° (True Node)
};

// Mercury retrograde periods 2026
const MERC_RETRO = [
  { start: 50, end: 72 },   // Feb 19 - Mar 13
  { start: 166, end: 189 }, // Jun 15 - Jul 8
  { start: 281, end: 305 }, // Oct 8 - Nov 1
];

// Venus retrograde
const VEN_RETRO = [
  { start: 1, end: 90 },    // Jan 1 - Mar 31 (ongoing from 2025)
];

// Jupiter retrograde (direct around Feb 4 2026)
const JUP_RETRO = [
  { start: 1, end: 35 },    // Jan 1 - Feb 4
];

function getDayOfYear(date) {
  const start = new Date(2026, 0, 1);
  return Math.floor((date - start) / 86400000) + 1;
}

function getTransitPos(planet, doy) {
  let base = BASE_2026[planet];
  let motion = DAILY_MOTION[planet];

  // Handle retrograde
  if (planet === 'mercury') {
    MERC_RETRO.forEach(r => {
      if (doy >= r.start && doy <= r.end) motion = -motion * 0.8;
    });
  }
  if (planet === 'venus') {
    VEN_RETRO.forEach(r => {
      if (doy >= r.start && doy <= r.end) motion = -0.5;
    });
  }
  if (planet === 'jupiter') {
    JUP_RETRO.forEach(r => {
      if (doy >= r.start && doy <= r.end) motion = -0.03;
    });
  }

  return ((base + motion * (doy - 1)) % 360 + 360) % 360;
}

function getMoonPos(doy) {
  // More accurate moon with synodic variation
  const base = BASE_2026.moon;
  return ((base + DAILY_MOTION.moon * (doy - 1)) % 360 + 360) % 360;
}

// =============================================
// ASPECT CALCULATION
// =============================================
function angleDiff(a, b) {
  let d = Math.abs(a - b) % 360;
  if (d > 180) d = 360 - d;
  return d;
}

const ASPECTS = [
  { name:'Conjunction', deg:0,   orb:6, weight: 1.0 },
  { name:'Opposition',  deg:180, orb:6, weight:-1.0 },
  { name:'Trine',       deg:120, orb:5, weight: 0.7 },
  { name:'Square',      deg:90,  orb:5, weight:-0.7 },
  { name:'Sextile',     deg:60,  orb:4, weight: 0.4 },
  { name:'Quincunx',    deg:150, orb:3, weight:-0.2 },
];

function getAspect(tPos, nPos) {
  const diff = angleDiff(tPos, nPos);
  for (const asp of ASPECTS) {
    if (Math.abs(diff - asp.deg) <= asp.orb) {
      const strength = 1 - Math.abs(diff - asp.deg) / asp.orb;
      return { ...asp, strength, exactDiff: diff };
    }
  }
  return null;
}

// Planet weights for scoring
const PLANET_WEIGHTS = {
  sun:     1.0,
  moon:    1.5,   // จันทร์สำคัญมาก (เจ้าชีวิตวันจันทร์)
  mercury: 0.5,
  venus:   0.8,
  mars:    0.7,
  jupiter: 1.2,
  saturn:  1.0,
  rahu:    0.6,
};

const NATAL_POINTS = ['asc','sun','moon','mercury','venus','mars','jupiter','saturn'];

// =============================================
// COMPUTE DAILY SCORE
// =============================================
function computeDay(doy) {
  const aspects = [];
  let rawScore = 0;

  const transits = {
    sun:     getTransitPos('sun', doy),
    moon:    getMoonPos(doy),
    mercury: getTransitPos('mercury', doy),
    venus:   getTransitPos('venus', doy),
    mars:    getTransitPos('mars', doy),
    jupiter: getTransitPos('jupiter', doy),
    saturn:  getTransitPos('saturn', doy),
    rahu:    getTransitPos('rahu', doy),
  };

  // Check slow planet transits to natal points
  const slowPlanets = ['saturn','jupiter','mars','rahu'];
  const fastPlanets = ['sun','moon','venus','mercury'];

  slowPlanets.forEach(tp => {
    NATAL_POINTS.forEach(np => {
      if (!NATAL[np]) return;
      const asp = getAspect(transits[tp], NATAL[np]);
      if (asp) {
        const score = asp.weight * PLANET_WEIGHTS[tp] * asp.strength * 2.0;
        rawScore += score;
        aspects.push({ transit: tp, natal: np, aspect: asp, score, slow: true });
      }
    });
  });

  // Fast planets (lighter weight)
  fastPlanets.forEach(tp => {
    ['sun','moon','asc','jupiter'].forEach(np => {
      if (!NATAL[np]) return;
      const asp = getAspect(transits[tp], NATAL[np]);
      if (asp) {
        const score = asp.weight * PLANET_WEIGHTS[tp] * asp.strength * 0.8;
        rawScore += score;
        aspects.push({ transit: tp, natal: np, aspect: asp, score, slow: false });
      }
    });
  });

  // Normalize to 1-7 scale
  const clamped = Math.max(-8, Math.min(8, rawScore));
  const score = Math.round(((clamped + 8) / 16) * 6) + 1;

  return { score: Math.max(1, Math.min(7, score)), aspects, transits, rawScore };
}

// =============================================
// BUILD YEAR DATA
// =============================================
const yearData = [];
for (let m = 0; m < 12; m++) {
  const days = new Date(2026, m+1, 0).getDate();
  const monthDays = [];
  for (let d = 1; d <= days; d++) {
    const date = new Date(2026, m, d);
    const doy = getDayOfYear(date);
    const { score, aspects, transits, rawScore } = computeDay(doy);
    monthDays.push({ date, d, m, doy, score, aspects, transits, rawScore });
  }
  yearData.push(monthDays);
}

// =============================================
// SCORE META
// =============================================
function scoreMeta(score) {
  const meta = [
    null,
    { label:'แย่มาก',  color:'#e74c3c', bg:'#1a0808', cls:'s1', advice:'หลีกเลี่ยงการตัดสินใจสำคัญ พักผ่อนให้เต็มที่ ระวังอุบัติเหตุ' },
    { label:'แย่',     color:'#e67e22', bg:'#1a1008', cls:'s2', advice:'งดลงทุนหรือเริ่มโปรเจกต์ใหม่ โฟกัสงานประจำ หลีกเลี่ยงความขัดแย้ง' },
    { label:'ธรรมดา', color:'#d4ac0d', bg:'#1a1a08', cls:'s3', advice:'วันปกติ ทำงานประจำได้ดี ไม่มีแรงหนุนพิเศษแต่ก็ไม่มีอุปสรรค' },
    { label:'ดี',      color:'#27ae60', bg:'#0a1a0a', cls:'s4', advice:'เหมาะสำหรับนัดสำคัญ เจรจา และงานที่ต้องใช้ความคิดสร้างสรรค์' },
    { label:'ดีมาก',   color:'#1abc9c', bg:'#081a14', cls:'s5', advice:'วันเด่น เหมาะเริ่มสิ่งใหม่ พบปะผู้คน และทำธุรกิจ' },
    { label:'ดีเยี่ยม',color:'#2e86c1', bg:'#080f1a', cls:'s6', advice:'โชควาสนาหนุน เหมาะสำหรับการตัดสินใจสำคัญ ลงนาม ขอหรือนำเสนอ' },
    { label:'โดดเด่น', color:'#8e44ad', bg:'#10081a', cls:'s7', advice:'วันพิเศษสุด ดาวหนุนเต็มที่ เหมาะทำสิ่งสำคัญในชีวิต' },
  ];
  return meta[score];
}

function planetNameTH(p) {
  const n = {sun:'อาทิตย์',moon:'จันทร์',mercury:'พุธ',venus:'ศุกร์',mars:'อังคาร',jupiter:'พฤหัส',saturn:'เสาร์',rahu:'ราหู',asc:'ลัคนา'};
  return n[p] || p;
}

function planetIcon(p) {
  const i = {sun:'☉',moon:'☽',mercury:'☿',venus:'♀',mars:'♂',jupiter:'♃',saturn:'♄',rahu:'☊',asc:'↑'};
  return i[p] || '★';
}

function aspectNameTH(name) {
  const n = {Conjunction:'ทับ (Conjunction)',Opposition:'เล็ง (Opposition)',Trine:'ทรีน',Square:'สี่เหลี่ยม',Sextile:'เซ็กซ์ไทล์',Quincunx:'ควินคันซ์'};
  return n[name] || name;
}

// =============================================
// RENDER CALENDAR
// =============================================
let activeMonth = new Date().getMonth();
const today = new Date();
today.setHours(0,0,0,0);

function renderMonthTabs() {
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = '';
  MONTH_TH.forEach((m, i) => {
    const tab = document.createElement('div');
    tab.className = 'mtab' + (i === activeMonth ? ' active' : '');
    tab.textContent = m;
    tab.onclick = () => {
      activeMonth = i;
      renderMonthTabs();
      renderCalendar();
      document.getElementById('calWrap').scrollIntoView({ behavior: 'smooth' });
    };
    tabs.appendChild(tab);
  });
}

function renderCalendar() {
  const wrap = document.getElementById('calWrap');
  wrap.innerHTML = '';

  const monthDays = yearData[activeMonth];
  const firstDay = monthDays[0].date.getDay(); // 0=Sun

  const label = document.createElement('div');
  label.className = 'month-label';
  label.textContent = MONTH_FULL[activeMonth] + ' 2569';
  wrap.appendChild(label);

  const hdrs = document.createElement('div');
  hdrs.className = 'cal-header';
  DOW_TH.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    hdrs.appendChild(el);
  });
  wrap.appendChild(hdrs);

  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty';
    grid.appendChild(empty);
  }

  // Day cells
  monthDays.forEach(day => {
    const cell = document.createElement('div');
    const meta = scoreMeta(day.score);
    cell.className = 'cal-cell ' + meta.cls;
    cell.style.background = meta.bg;

    const isToday = day.date.getTime() === today.getTime();
    if (isToday) cell.classList.add('today');

    cell.innerHTML = `
      <div class="cal-day" style="color:${meta.color}">${day.d}</div>
      <div class="cal-score" style="color:${meta.color}">${day.score}/7</div>
      <div class="cal-bar" style="background:${meta.color}"></div>
    `;

    cell.onclick = () => openPanel(day);
    grid.appendChild(cell);
  });

  wrap.appendChild(grid);
}

// =============================================
// PANEL
// =============================================
let currentSelected = null;

function openPanel(day) {
  if (currentSelected) currentSelected.classList.remove('selected');

  // Find and mark selected cell
  const cells = document.querySelectorAll('.cal-cell:not(.empty)');
  cells[day.d - 1].classList.add('selected');
  currentSelected = cells[day.d - 1];

  const meta = scoreMeta(day.score);
  const dow = DOW_FULL[day.date.getDay()];
  const dateStr = `${day.d} ${MONTH_FULL[day.m]} 2569`;

  // Sort aspects by impact
  const sorted = [...day.aspects].sort((a, b) => Math.abs(b.score) - Math.abs(a.score));
  const top = sorted.slice(0, 5);

  let aspHtml = '';
  top.forEach(a => {
    const isPos = a.score > 0;
    const icon = isPos ? '✨' : (a.aspect.name === 'Opposition' || a.aspect.name === 'Square' ? '⚡' : '〰️');
    const cls = isPos ? 'asp-pos' : 'asp-neg';
    const strength = a.aspect.strength > 0.7 ? 'แม่นมาก' : a.aspect.strength > 0.4 ? 'ปานกลาง' : 'อ่อน';
    const aspTH = aspectNameTH(a.aspect.name);
    aspHtml += `
      <div class="aspect-item">
        <div class="asp-icon">${icon}</div>
        <div class="asp-body">
          <div class="asp-title ${cls}">${planetIcon(a.transit)} ${planetNameTH(a.transit)}-Transit ${aspTH} ${planetIcon(a.natal)} ${planetNameTH(a.natal)}-กำเนิด</div>
          <div class="asp-desc">กำลัง: ${strength} · ${isPos ? '+ หนุน' : '− กดดัน'} · ${a.slow ? 'ดาวช้า (มีผลนาน)' : 'ดาวเร็ว (มีผลสั้น)'}</div>
        </div>
      </div>`;
  });

  if (top.length === 0) {
    aspHtml = `<div class="aspect-item"><div class="asp-icon">🌙</div><div class="asp-body"><div class="asp-title asp-neu">ไม่มี Aspect สำคัญ</div><div class="asp-desc">ดาวเดินไม่กระทบดวงกำเนิดวันนี้ — พลังงานสงบ</div></div></div>`;
  }

  document.getElementById('panelContent').innerHTML = `
    <div class="panel-date">${dateStr}</div>
    <div class="panel-weekday">${dow}</div>
    <div class="score-display">
      <div class="score-circle" style="color:${meta.color}; border-color:${meta.color}; background:${meta.bg}">
        <div class="score-num" style="color:${meta.color}">${day.score}</div>
        <div class="score-max" style="color:${meta.color}">/7</div>
      </div>
      <div>
        <div class="score-label" style="color:${meta.color}">${meta.label}</div>
        <div class="score-desc">${meta.advice}</div>
      </div>
    </div>
    <div class="aspect-list">${aspHtml}</div>
    <div class="advice-box">
      <h4>⭐ คำแนะนำสำหรับวันนี้</h4>
      <p>${getAdvice(day)}</p>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function getAdvice(day) {
  const meta = scoreMeta(day.score);
  const dow = day.date.getDay();
  const advices = {
    1: ['หลีกเลี่ยงการเซ็นเอกสารสำคัญ', 'พักผ่อนและดูแลสุขภาพ', 'หลีกเลี่ยงการลงทุนหรือเริ่มโปรเจกต์ใหม่'],
    2: ['ระวังความขัดแย้งกับเพื่อนร่วมงาน', 'ชะลอการตัดสินใจสำคัญ', 'โฟกัสงานที่ค้างอยู่แทนงานใหม่'],
    3: ['วันทำงานประจำได้ดี', 'เหมาะทบทวนและวางแผน', 'ไม่มีอุปสรรคพิเศษ ทำงานตามปกติได้'],
    4: ['เหมาะนัดประชุมหรือเจรจา', 'สามารถเริ่มโปรเจกต์ใหม่ได้', 'พลังงานดี ความคิดสร้างสรรค์หนุน'],
    5: ['วันดีสำหรับการสื่อสารและสร้างความสัมพันธ์', 'เหมาะนำเสนองานหรือพบลูกค้า', 'โชควาสนาหนุนในเรื่องการเงิน'],
    6: ['วันดีเยี่ยม เหมาะตัดสินใจสำคัญ', 'ลงนามสัญญาหรือเซ็นเอกสารในวันนี้ได้', 'พลังงานดีทุกด้าน'],
    7: ['วันพิเศษ ทำสิ่งสำคัญในชีวิต', 'โอกาสทองอย่าปล่อยผ่าน', 'ดาวหนุนเต็มที่ทุกด้าน'],
  };
  const list = advices[day.score] || advices[3];
  const extra = dow === 1 ? ' วันจันทร์เป็นวันเกิดของ Y พลังงานดาวจันทร์หนุนเป็นพิเศษ' : '';
  return list[Math.floor(Math.random() * list.length)] + extra;
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if (currentSelected) {
    currentSelected.classList.remove('selected');
    currentSelected = null;
  }
}

// Swipe down to close
let startY = 0;
document.getElementById('detailPanel').addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
document.getElementById('detailPanel').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - startY > 60) closePanel();
});

// =============================================
// INIT
// =============================================
// Jump to today's month
const now = new Date();
if (now.getFullYear() === 2026) activeMonth = now.getMonth();
else activeMonth = 0;

renderMonthTabs();
renderCalendar();

// Auto-open today if in 2026
if (now.getFullYear() === 2026) {
  const todayData = yearData[now.getMonth()][now.getDate() - 1];
  setTimeout(() => openPanel(todayData), 800);
}
</script>
