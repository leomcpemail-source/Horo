<script>
// ===== KEY =====
const GROQ_MODEL='llama-3.3-70b-versatile', LS_KEY='groq_key_y2569';
let GROQ_KEY='';

function saveKey(){
  const v=document.getElementById('keyInput').value.trim();
  if(!v.startsWith('gsk_')||v.length<20){document.getElementById('setupErr').style.display='block';return;}
  localStorage.setItem(LS_KEY,v); GROQ_KEY=v;
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}
function changeKey(){localStorage.removeItem(LS_KEY);location.reload();}
document.getElementById('keyInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveKey();});
window.addEventListener('load',()=>{
  const s=localStorage.getItem(LS_KEY);
  if(s&&s.startsWith('gsk_')){GROQ_KEY=s;document.getElementById('setupScreen').style.display='none';document.getElementById('app').style.display='block';initApp();}
});

// ===== NATAL =====
const NATAL={asc:271.97,sun:300.80,moon:298.47,mercury:282.66,venus:345.83,mars:350.31,jupiter:266.75,saturn:236.41,rahu:55.26};
const SIGNS=['เมษ','พฤษภ','เมถุน','กรกฎ','สิงห์','กันย์','ตุลย์','พิจิก','ธนู','มกร','กุมภ์','มีน'];
const PNAMES={sun:'พระอาทิตย์',moon:'พระจันทร์',mercury:'พระพุธ',venus:'พระศุกร์',mars:'พระอังคาร',jupiter:'พระพฤหัส',saturn:'พระเสาร์',rahu:'พระราหู',asc:'ลัคนา'};
const ANAMES={Conjunction:'โคจรทับ',Opposition:'โคจรเผชิญหน้า',Trine:'โคจรเสริม',Square:'โคจรขัด',Sextile:'โคจรหนุน',Quincunx:'กดดันเล็กน้อย'};
const MF=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DS=['อา','จ','อ','พ','พฤ','ศ','ส'];
const DF=['วันอาทิตย์','วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์','วันเสาร์'];

const DM={sun:0.9856,moon:13.1764,mercury:1.3833,venus:1.2,mars:0.524,jupiter:0.0831,saturn:0.0334,rahu:-0.0529};
const B26={sun:280.5,moon:72.3,mercury:270.1,venus:315.4,mars:101.2,jupiter:58.8,saturn:345.6,rahu:11.2};
const MR=[{s:50,e:72},{s:166,e:189},{s:281,e:305}];
const VR=[{s:1,e:90}]; const JR=[{s:1,e:35}];

function getDOY(d){return Math.floor((d-new Date(2026,0,1))/86400000)+1;}
function signOf(deg){return SIGNS[Math.floor(((deg%360)+360)%360/30)];}
function tp(p,doy){
  let b=B26[p],m=DM[p];
  if(p==='mercury')MR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-m*0.8;});
  if(p==='venus')  VR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-0.5;});
  if(p==='jupiter')JR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-0.03;});
  return((b+m*(doy-1))%360+360)%360;
}
function ad(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
const ASPS=[{n:'Conjunction',d:0,o:6,w:1},{n:'Opposition',d:180,o:6,w:-1},{n:'Trine',d:120,o:5,w:0.7},{n:'Square',d:90,o:5,w:-0.7},{n:'Sextile',d:60,o:4,w:0.4},{n:'Quincunx',d:150,o:3,w:-0.2}];
const PW={sun:1,moon:1.5,mercury:0.5,venus:0.8,mars:0.7,jupiter:1.2,saturn:1,rahu:0.6};
const NP=['asc','sun','moon','mercury','venus','mars','jupiter','saturn'];

function computeDay(doy){
  const asp=[],tr={};
  ['sun','moon','mercury','venus','mars','jupiter','saturn','rahu'].forEach(p=>{tr[p]=tp(p,doy);});
  let raw=0;
  ['saturn','jupiter','mars','rahu'].forEach(t=>{
    NP.forEach(n=>{
      if(NATAL[n]==null)return;
      const df=ad(tr[t],NATAL[n]);
      for(const a of ASPS){if(Math.abs(df-a.d)<=a.o){const st=1-Math.abs(df-a.d)/a.o,sc=a.w*PW[t]*st*2;raw+=sc;asp.push({transit:t,natal:n,aspName:a.n,weight:a.w,strength:st,score:sc,slow:true});break;}}
    });
  });
  ['sun','moon','venus','mercury'].forEach(t=>{
    ['sun','moon','asc','jupiter'].forEach(n=>{
      if(NATAL[n]==null)return;
      const df=ad(tr[t],NATAL[n]);
      for(const a of ASPS){if(Math.abs(df-a.d)<=a.o){const st=1-Math.abs(df-a.d)/a.o,sc=a.w*PW[t]*st*0.8;raw+=sc;asp.push({transit:t,natal:n,aspName:a.n,weight:a.w,strength:st,score:sc,slow:false});break;}}
    });
  });
  const sc=Math.max(1,Math.min(10,Math.round(((Math.max(-8,Math.min(8,raw))+8)/16)*9)+1));
  return{score:sc,aspects:asp,transits:tr};
}

// ===== WEEK =====
let weekOffset=0, selDate=new Date(); selDate.setHours(0,0,0,0);

function getWeekDates(off){
  const now=new Date();now.setHours(0,0,0,0);
  const dow=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-dow+(dow===0?-6:1)+off*7);
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}
  return days;
}

function setWeek(off){
  weekOffset=off;
  document.getElementById('btnW0').className='week-btn'+(off===0?' week-btn-active':'');
  document.getElementById('btnW1').className='week-btn'+(off===1?' week-btn-active':'');
  renderDayPicker();
}

function renderDayPicker(){
  const days=getWeekDates(weekOffset);
  const today=new Date();today.setHours(0,0,0,0);
  const f=days[0],l=days[6];
  document.getElementById('weekRangeLabel').textContent=f.getDate()+' '+MF[f.getMonth()].slice(0,3)+' - '+l.getDate()+' '+MF[l.getMonth()].slice(0,3);
  const picker=document.getElementById('dayPicker');picker.innerHTML='';
  days.forEach(d=>{
    const isAct=d.getTime()===selDate.getTime();
    const isTod=d.getTime()===today.getTime();
    const item=document.createElement('div');
    item.className='day-item'+(isAct?' day-item-active':isTod?' day-item-today':'');
    item.innerHTML='<div class="day-dow">'+DS[d.getDay()]+'</div><div class="day-num">'+d.getDate()+'</div><div class="day-pip'+(isAct?' day-pip-active':'')+'"></div>';
    item.onclick=()=>{selDate=new Date(d);selDate.setHours(0,0,0,0);renderDayPicker();loadDash();};
    picker.appendChild(item);
  });
}

// ===== DONUT =====
function buildDonut(score){
  const pct=score/10, r=36, circ=2*Math.PI*r;
  const dash=(pct*circ).toFixed(1);
  const col=score>=7?'#f5a623':score>=5?'#f5a623':'#e74c3c';
  return '<svg width="90" height="90" viewBox="0 0 90 90" style="transform:rotate(-90deg)">'+
    '<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="9"/>'+
    '<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+dash+' '+(circ).toFixed(1)+'"/>'+
    '</svg>';
}

// ===== META =====
function smeta(s){
  if(s>=9)return{label:'โดดเด่น',bg:'#f5a623',col:'#fff'};
  if(s>=7)return{label:'ดีมาก',bg:'#e8f8f0',col:'#27ae60'};
  if(s>=6)return{label:'ดี',bg:'#e8f8f0',col:'#27ae60'};
  if(s>=5)return{label:'ธรรมดา',bg:'#f0f4f5',col:'#5a8090'};
  if(s>=4)return{label:'แย่',bg:'#fdf0ef',col:'#e74c3c'};
  return{label:'แย่มาก',bg:'#fdf0ef',col:'#e74c3c'};
}

function lvStyle(l){
  if(l==='ดีมาก'||l==='ดี'||l==='โดดเด่น')return'background-color:#e8f8f0;color:#27ae60;';
  if(l==='ธรรมดา')return'background-color:#f0f4f5;color:#5a8090;';
  return'background-color:#fdf0ef;color:#e74c3c;';
}
function lvClass(l){return l==='ดีมาก'||l==='ดี'||l==='โดดเด่น'?'lv-good':l==='ธรรมดา'?'lv-norm':'lv-warn';}

// area colors (no emoji, just color circles)
const AREA_COLORS={

};

  'บริวาร':'คน','ครอบครัว':'บ้าน','การเดินทาง':'เดิน',

// ===== PROMPT =====
function buildPrompt(date,score,aspects,transits){
  const meta=smeta(score);
  const tDesc=Object.entries(transits).map(([p,deg])=>PNAMES[p]+'ในราศี'+signOf(deg)).join(', ');
  const aDesc=aspects.length===0?'ไม่มีปฏิสัมพันธ์สำคัญ':
    aspects.sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).slice(0,5)
    .map(a=>PNAMES[a.transit]+(ANAMES[a.aspName]||a.aspName)+PNAMES[a.natal]+'('+(a.weight>0?'หนุน':'กดดัน')+' '+(a.strength>0.7?'แม่น':'อ่อน')+' '+(a.slow?'ยาว':'สั้น')+')').join(', ');
  return `คุณเป็นโหรผู้เชี่ยวชาญ วิเคราะห์ดวงชะตารายวันเป็นภาษาไทยธรรมดา สั้นกระชับ เข้าใจง่าย

เจ้าของดวง: Y ชาย เกิด 21 มกราคม 2528 เวลา 04:50 น. กรุงเทพฯ ลัคนามกร เกิดวันจันทร์
วันที่: ${date.getDate()} ${MF[date.getMonth()]} 2569 (${DF[date.getDay()]})
คะแนนดวง: ${score}/10 (${meta.label})
ตำแหน่งดาว: ${tDesc}
ปฏิสัมพันธ์: ${aDesc}

ตอบ JSON เท่านั้น ห้ามมี markdown:
{"tags":["tag1","tag2","tag3"],"overall":"สรุป 2 ประโยค","do":["ควรทำ1","ควรทำ2","ควรทำ3"],"dont":["หลีกเลี่ยง1","หลีกเลี่ยง2","หลีกเลี่ยง3"],"boss":{"level":"ดี","summary":"สรุป 1 ประโยค","body":"รายละเอียด 2-3 ประโยค เกี่ยวกับเจ้านาย/ผู้มีอำนาจ เช่น เพ่งเล็ง โยกย้าย หรือสนับสนุน"},"areas":[{"title":"การเงิน","level":"ดี","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"},{"title":"การงาน","level":"ธรรมดา","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"},{"title":"คู่สมรส","level":"ดี","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"},{"title":"บริวาร","level":"ดี","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"},{"title":"ครอบครัว","level":"ธรรมดา","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"},{"title":"การเดินทาง","level":"ดี","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"},{"title":"สุขภาพ","level":"ดี","summary":"1 ประโยคสั้น","body":"2-3 ประโยค"}]}
level: ดีมาก|ดี|ธรรมดา|ระวัง|แย่  tags: 3-4 คำ เช่น งานหนัก เครียด ระวังเจ้านาย โชคดี ป่วยได้ ดวงดี`;
}

// ===== API =====
const cache={};
async function fetchReading(date){
  const k=date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate();
  if(cache[k])return cache[k];
  const doy=getDOY(date);
  const {score,aspects,transits}=computeDay(doy);
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
    body:JSON.stringify({model:GROQ_MODEL,temperature:0.7,max_tokens:1400,messages:[{role:'user',content:buildPrompt(date,score,aspects,transits)}]})
  });
  if(!res.ok)throw new Error('Groq '+res.status);
  const data=await res.json();
  const text=data.choices[0].message.content.trim();
  const match=text.match(/\{[\s\S]*\}/);
  const r=JSON.parse(match?match[0]:text);
  r._score=score; cache[k]=r; return r;
}

function tagCls(t){
  const m={'งานหนัก':'hero-tag-work','งานเยอะ':'hero-tag-work','ประชุมเยอะ':'hero-tag-work',
    'เครียด':'hero-tag-warn','ระวัง':'hero-tag-warn','ปากเสีย':'hero-tag-warn',
    'ระวังเจ้านาย':'hero-tag-boss','เจ้านายจับตา':'hero-tag-boss','โยกย้าย':'hero-tag-boss',
    'โชคดี':'hero-tag-good','เงินเข้า':'hero-tag-good','ดวงดี':'hero-tag-good','คนรักดี':'hero-tag-good',
    'ป่วยได้':'hero-tag-warn','ระวังอุบัติเหตุ':'hero-tag-warn'};
  return m[t]||'';
}

// ===== LOAD DASHBOARD =====

  const d=selDate;

  const meta=smeta(score);

  body.innerHTML=
    '<div class="hero-card">'+
      '<div class="hero-deco"></div><div class="hero-deco2"></div>'+
      '<div class="hero-top">'+
        '<div class="hero-label">ดวงชะตาวันนี้</div>'+
        '<div class="hero-date-txt">'+d.getDate()+' '+MF[d.getMonth()].slice(0,3)+' · '+DF[d.getDay()].replace('วัน','')+'</div>'+
      '</div>'+
      '<div class="hero-main">'+
        '<div class="hero-left">'+
          '<div class="hero-score-lbl">คะแนนดวงรวม</div>'+
          '<div style="display:flex;align-items:baseline;gap:4px">'+
            '<div class="hero-score-num">'+score+'</div>'+
            '<div class="hero-score-denom">/10</div>'+
          '</div>'+
          '<div class="hero-badge" style="background-color:'+(score<=4?'#e74c3c':'#f5a623')+'">'+meta.label+'</div>'+
        '</div>'+
        '<div class="donut-wrap">'+
          buildDonut(score)+
          '<div class="donut-center"><div class="donut-num">'+score+'</div><div class="donut-sub">/ 10</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="hero-tags" id="heroTags"><div class="hero-tag">กำลังโหลด...</div></div>'+
    '</div>'+
    '<div class="sec-title">ดวงแต่ละด้าน</div>'+
    '<div class="area-grid" id="areaGrid">'+
      '<div class="loading-card"><div class="spin"></div>กำลังวิเคราะห์ดวง...</div>'+
    '</div>';

  try{
    const r=await fetchReading(d);

    // Tags
    const te=document.getElementById('heroTags');
    if(te&&r.tags) te.innerHTML=r.tags.map(t=>'<div class="hero-tag '+tagCls(t)+'">'+t+'</div>').join('');

    // Grid
    const grid=document.getElementById('areaGrid');
    if(!grid)return;
    let html='';

    // Boss wide tile
    if(r.boss){
      const bc=AREA_COLORS['เจ้านาย / ผู้มีอำนาจ'];
      html+='<div class="area-tile area-tile-wide" onclick="openDetail(\'เจ้านาย / ผู้มีอำนาจ\',\''+r.boss.level+'\',\'boss\',\'\')">'+
        '<div class="area-color-bar" style="background-color:'+bc+'"></div>'+
        '<div style="flex:1">'+
          '<div class="area-label">เจ้านาย / ผู้มีอำนาจ</div>'+
          '<div class="area-summary">'+( r.boss.summary||r.boss.body.slice(0,40))+'</div>'+
        '</div>'+
        '<div class="area-lv '+lvClass(r.boss.level)+'" style="'+lvStyle(r.boss.level)+'">'+r.boss.level+'</div>'+
        '<div class="area-arrow">›</div>'+
      '</div>';
    }

    // Area tiles
    if(r.areas){
      r.areas.forEach(a=>{
        const col=AREA_COLORS[a.title]||'#7a9aa5';
        const abbr=AREA_ABBR[a.title]||'?';
        html+='<div class="area-tile" onclick="openDetail(\''+a.title+'\',\''+a.level+'\',\'area\',\''+a.title+'\')">'+
          '<div style="width:32px;height:32px;border-radius:10px;background-color:'+col+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;margin-bottom:8px;">'+abbr+'</div>'+
          '<div class="area-label">'+a.title+'</div>'+
          '<div class="area-summary">'+( a.summary||a.body).slice(0,30)+'...</div>'+
          '<div class="area-lv '+lvClass(a.level)+'">'+a.level+'</div>'+
          '<div class="area-arrow">›</div>'+
        '</div>';
      });
    }

    // Do/Don't tile
    html+='<div class="area-tile" onclick="openDetail(\'ควรทำ / หลีกเลี่ยง\',\'ธรรมดา\',\'dodont\',\'\')">'+

// ===== DETAIL =====
function openDetail(title, level, type, areaKey){
  const r=window._r, d=window._d;
  if(!r)return;
  const col=AREA_COLORS[title]||'#1e4d5c';
  const abbr=AREA_ABBR[title]||title.slice(0,2);
  document.getElementById('detailCircle').textContent=abbr;
  document.getElementById('detailCircle').style.backgroundColor=col;
  document.getElementById('detailTitle').textContent=title;
  const badge=document.getElementById('detailBadge');
  badge.textContent=level; badge.style.cssText='display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:8px;'+lvStyle(level);

  let html='';
  if(type==='boss'&&r.boss){
    html+='<div class="boss-card-detail"><div class="detail-card-title">สถานการณ์กับเจ้านาย</div><div class="detail-card-body">'+r.boss.body+'</div></div>';
    html+='<div class="detail-card"><div class="detail-card-title">คำแนะนำ</div><div class="detail-card-body">ในช่วงที่ดวงเจ้านายไม่เป็นใจ ควรทำงานให้เห็นชัด รายงานความคืบหน้าก่อนถูกถาม และหลีกเลี่ยงการขัดแย้งโดยตรง</div></div>';
  }else if(type==='area'&&r.areas){
    const a=r.areas.find(x=>x.title===areaKey);
    if(a) html+='<div class="detail-card"><div class="detail-card-title">'+a.title+'</div><div class="detail-card-body">'+a.body+'</div></div>';
  }else if(type==='dodont'){
    html+='<div class="dodont-row">'+
      '<div class="do-card"><div class="do-card-title">ควรทำ</div><ul class="dodont-list do-list">'+(r.do||[]).map(i=>'<li>'+i+'</li>').join('')+'</ul></div>'+
      '<div class="dont-card"><div class="dont-card-title">หลีกเลี่ยง</div><ul class="dodont-list dont-list">'+(r.dont||[]).map(i=>'<li>'+i+'</li>').join('')+'</ul></div>'+
    '</div>';
  }
  html+='<div class="detail-card"><div class="detail-card-title">ภาพรวมวันที่ '+d.getDate()+' '+MF[d.getMonth()]+'</div><div class="detail-card-body">'+(r.overall||'')+'</div></div>';
  document.getElementById('detailBody').innerHTML=html;
  document.getElementById('pageDash').classList.remove('active');
  document.getElementById('pageDetail').classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('pageDetail').classList.remove('active');
  document.getElementById('pageDash').classList.add('active');
}

function initApp(){
  let d=new Date(); d.setHours(0,0,0,0);
  if(d.getFullYear()!==2026){d=new Date(2026,2,28);} // use today's date in 2026 context
  selDate=d; weekOffset=0;

}
