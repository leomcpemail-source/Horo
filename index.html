<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ดวงรายวัน Y · ปี 2569</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
background: #080612;
background-color: #080612;
color: #ddd8f0;
font-family: ‘Sarabun’, Tahoma, Arial, sans-serif;
min-height: 100vh;
overscroll-behavior: none;
}

.hdr {
background: #120f28;
border-bottom: 1px solid rgba(180,150,80,0.2);
padding: 20px 16px 14px;
text-align: center;
position: sticky;
top: 0;
z-index: 100;
}
.hdr-title {
font-family: ‘Cinzel’, Georgia, serif;
font-size: 18px;
color: #e8d08a;
letter-spacing: 2px;
}
.hdr-sub {
font-size: 11px;
color: #7060a0;
margin-top: 4px;
letter-spacing: 1px;
}

.month-tabs {
display: flex;
overflow-x: auto;
gap: 6px;
padding: 10px 16px;
background: #100e22;
border-bottom: 1px solid rgba(180,150,80,0.15);
scrollbar-width: none;
position: sticky;
top: 68px;
z-index: 99;
}
.month-tabs::-webkit-scrollbar { display: none; }

.mtab {
flex-shrink: 0;
padding: 6px 14px;
border-radius: 20px;
border: 1px solid rgba(180,150,80,0.2);
background: #161230;
color: #7060a0;
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
font-family: ‘Sarabun’, Tahoma, Arial, sans-serif;
}
.mtab.active {
background: #c9a84c;
color: #080612;
border-color: #c9a84c;
}

.summary-bar {
display: flex;
gap: 8px;
padding: 8px 16px;
overflow-x: auto;
scrollbar-width: none;
background: #080612;
}
.summary-bar::-webkit-scrollbar { display: none; }
.sbar-item {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 5px;
font-size: 11px;
color: #7060a0;
}
.sbar-dot { width: 8px; height: 8px; border-radius: 50%; }

.cal-wrap { padding: 8px 10px 130px; background: #080612; }

.month-label {
font-family: ‘Cinzel’, Georgia, serif;
font-size: 13px;
color: #c9a84c;
letter-spacing: 2px;
margin: 14px 0 10px;
padding-bottom: 6px;
border-bottom: 1px solid rgba(180,150,80,0.15);
}

.cal-header {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
margin-bottom: 4px;
}
.cal-dow {
text-align: center;
font-size: 10px;
color: #7060a0;
padding: 4px 0;
font-weight: 600;
}

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 3px;
}

.cal-cell {
aspect-ratio: 1;
border-radius: 8px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
cursor: pointer;
position: relative;
border: 1px solid transparent;
min-height: 40px;
transition: transform 0.12s;
}
.cal-cell:active { transform: scale(0.9); }
.cal-cell.today { border-color: #c9a84c !important; }
.cal-cell.selected { border-color: #ffffff !important; box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }
.cal-cell.empty { background-color: transparent !important; cursor: default; }

.cal-day { font-size: 13px; font-weight: 700; line-height: 1; }
.cal-score { font-size: 9px; margin-top: 2px; font-weight: 600; opacity: 0.85; }
.cal-bar {
position: absolute;
bottom: 3px; left: 4px; right: 4px;
height: 2px; border-radius: 2px; opacity: 0.7;
}

.overlay {
position: fixed; inset: 0;
background: rgba(0,0,0,0.55);
z-index: 190; opacity: 0;
pointer-events: none;
transition: opacity 0.25s;
}
.overlay.show { opacity: 1; pointer-events: auto; }

.detail-panel {
position: fixed;
bottom: 0; left: 0; right: 0;
background: #100e22;
border-top: 1px solid rgba(180,150,80,0.2);
border-radius: 20px 20px 0 0;
transform: translateY(100%);
transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1);
z-index: 200;
max-height: 80vh;
overflow-y: auto;
}
.detail-panel.open { transform: translateY(0); }

.panel-handle {
width: 36px; height: 4px;
background: rgba(180,150,80,0.25);
border-radius: 2px;
margin: 12px auto 0;
}

.panel-content { padding: 14px 16px 32px; }

.panel-date {
font-family: ‘Cinzel’, Georgia, serif;
font-size: 15px;
color: #e8d08a;
margin-bottom: 3px;
}
.panel-weekday { font-size: 12px; color: #7060a0; margin-bottom: 12px; }

.score-display {
display: flex;
align-items: center;
gap: 14px;
background: #161230;
border-radius: 14px;
padding: 14px 16px;
margin-bottom: 12px;
border: 1px solid rgba(180,150,80,0.15);
}
.score-circle {
width: 58px; height: 58px;
border-radius: 50%;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
flex-shrink: 0;
border: 2px solid currentColor;
}
.score-num { font-family: ‘Cinzel’, Georgia, serif; font-size: 24px; font-weight: 700; line-height: 1; }
.score-max { font-size: 10px; opacity: 0.6; }
.score-label { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.score-desc { font-size: 12px; color: #7060a0; line-height: 1.5; }

.aspect-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

.aspect-item {
background: #161230;
border-radius: 10px;
padding: 10px 12px;
border: 1px solid rgba(180,150,80,0.12);
display: flex; gap: 10px;
align-items: flex-start;
}
.asp-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
.asp-body { flex: 1; }
.asp-title { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.asp-desc { font-size: 11px; color: #7060a0; line-height: 1.6; }
.asp-pos { color: #2ecc71; }
.asp-neg { color: #e74c3c; }
.asp-neu { color: #f1c40f; }

.advice-box {
background: #0f0d20;
border: 1px solid rgba(201,168,76,0.2);
border-radius: 12px;
padding: 12px 14px;
}
.advice-box h4 { font-size: 12px; color: #c9a84c; margin-bottom: 6px; }
.advice-box p { font-size: 12px; color: #7060a0; line-height: 1.7; }
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-title">Y · ดวงรายวัน 2569</div>
  <div class="hdr-sub">21 ม.ค. 2528 · ลัคนามกร · กดวันเพื่อดูรายละเอียด</div>
</div>

<div class="month-tabs" id="monthTabs"></div>

<div class="summary-bar">
  <div class="sbar-item"><div class="sbar-dot" style="background:#e74c3c"></div>แย่มาก</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#e67e22"></div>แย่</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#d4ac0d"></div>ธรรมดา</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#27ae60"></div>ดี</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#1abc9c"></div>ดีมาก</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#2e86c1"></div>ดีเยี่ยม</div>
  <div class="sbar-item"><div class="sbar-dot" style="background:#8e44ad"></div>โดดเด่น</div>
</div>

<div class="cal-wrap" id="calWrap"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-handle"></div>
  <div class="panel-content" id="panelContent"></div>
</div>

<script>
const NATAL={asc:271.97,sun:300.80,moon:298.47,mercury:282.66,venus:345.83,mars:350.31,jupiter:266.75,saturn:236.41,rahu:55.26};
const MONTH_TH=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const MONTH_FULL=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DOW_TH=['อา','จ','อ','พ','พฤ','ศ','ส'];
const DOW_FULL=['วันอาทิตย์','วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์','วันเสาร์'];
const DM={sun:0.9856,moon:13.1764,mercury:1.3833,venus:1.2,mars:0.524,jupiter:0.0831,saturn:0.0334,rahu:-0.0529};
const B26={sun:280.5,moon:72.3,mercury:270.1,venus:315.4,mars:101.2,jupiter:58.8,saturn:345.6,rahu:11.2};
const MR=[{s:50,e:72},{s:166,e:189},{s:281,e:305}];
const VR=[{s:1,e:90}];
const JR=[{s:1,e:35}];

function getDOY(d){return Math.floor((d-new Date(2026,0,1))/86400000)+1;}
function pos(planet,doy){
  let b=B26[planet],m=DM[planet];
  if(planet==='mercury') MR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-m*0.8;});
  if(planet==='venus')   VR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-0.5;});
  if(planet==='jupiter') JR.forEach(r=>{if(doy>=r.s&&doy<=r.e)m=-0.03;});
  return((b+m*(doy-1))%360+360)%360;
}
function adiff(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
const ASPS=[{n:'Conjunction',d:0,o:6,w:1},{n:'Opposition',d:180,o:6,w:-1},{n:'Trine',d:120,o:5,w:0.7},{n:'Square',d:90,o:5,w:-0.7},{n:'Sextile',d:60,o:4,w:0.4},{n:'Quincunx',d:150,o:3,w:-0.2}];
const PW={sun:1,moon:1.5,mercury:0.5,venus:0.8,mars:0.7,jupiter:1.2,saturn:1,rahu:0.6};
const NP=['asc','sun','moon','mercury','venus','mars','jupiter','saturn'];

function computeDay(doy){
  const asp=[],tr={};
  ['sun','moon','mercury','venus','mars','jupiter','saturn','rahu'].forEach(p=>{tr[p]=pos(p,doy);});
  let raw=0;
  ['saturn','jupiter','mars','rahu'].forEach(tp=>{
    NP.forEach(np=>{
      if(NATAL[np]==null)return;
      const df=adiff(tr[tp],NATAL[np]);
      for(const a of ASPS){if(Math.abs(df-a.d)<=a.o){const st=1-Math.abs(df-a.d)/a.o,sc=a.w*PW[tp]*st*2;raw+=sc;asp.push({transit:tp,natal:np,aspect:{...a,strength:st},score:sc,slow:true});break;}}
    });
  });
  ['sun','moon','venus','mercury'].forEach(tp=>{
    ['sun','moon','asc','jupiter'].forEach(np=>{
      if(NATAL[np]==null)return;
      const df=adiff(tr[tp],NATAL[np]);
      for(const a of ASPS){if(Math.abs(df-a.d)<=a.o){const st=1-Math.abs(df-a.d)/a.o,sc=a.w*PW[tp]*st*0.8;raw+=sc;asp.push({transit:tp,natal:np,aspect:{...a,strength:st},score:sc,slow:false});break;}}
    });
  });
  const sc=Math.max(1,Math.min(7,Math.round(((Math.max(-8,Math.min(8,raw))+8)/16)*6)+1));
  return{score:sc,aspects:asp};
}

const yearData=[];
for(let m=0;m<12;m++){
  const days=new Date(2026,m+1,0).getDate(),arr=[];
  for(let d=1;d<=days;d++){const date=new Date(2026,m,d),doy=getDOY(date);arr.push({date,d,m,doy,...computeDay(doy)});}
  yearData.push(arr);
}

function smeta(s){return [null,
  {label:'แย่มาก',color:'#e74c3c',bg:'#1a0808',advice:'หลีกเลี่ยงการตัดสินใจสำคัญ พักผ่อนให้เต็มที่'},
  {label:'แย่',color:'#e67e22',bg:'#1a1008',advice:'งดลงทุนหรือเริ่มโปรเจกต์ใหม่ โฟกัสงานประจำ'},
  {label:'ธรรมดา',color:'#d4ac0d',bg:'#1a1a08',advice:'วันปกติ ทำงานประจำได้ดี ไม่มีอุปสรรคพิเศษ'},
  {label:'ดี',color:'#27ae60',bg:'#0a1a0a',advice:'เหมาะสำหรับนัดสำคัญ เจรจา และงานสร้างสรรค์'},
  {label:'ดีมาก',color:'#1abc9c',bg:'#081a14',advice:'วันเด่น เหมาะเริ่มสิ่งใหม่ พบปะผู้คน ทำธุรกิจ'},
  {label:'ดีเยี่ยม',color:'#2e86c1',bg:'#080f1a',advice:'โชคหนุน เหมาะตัดสินใจสำคัญ ลงนาม นำเสนองาน'},
  {label:'โดดเด่น',color:'#8e44ad',bg:'#10081a',advice:'วันพิเศษสุด ดาวหนุนเต็มที่ ทำสิ่งสำคัญในชีวิต'}][s];}

const PNAMES={sun:'อาทิตย์',moon:'จันทร์',mercury:'พุธ',venus:'ศุกร์',mars:'อังคาร',jupiter:'พฤหัส',saturn:'เสาร์',rahu:'ราหู',asc:'ลัคนา'};
const PICONS={sun:'☉',moon:'☽',mercury:'☿',venus:'♀',mars:'♂',jupiter:'♃',saturn:'♄',rahu:'☊',asc:'↑'};
const ANAMES={Conjunction:'ทับ',Opposition:'เล็งตรง',Trine:'ทรีน',Square:'สี่เหลี่ยม',Sextile:'เซ็กซ์ไทล์',Quincunx:'ควินคันซ์'};

let activeMonth=(new Date().getFullYear()===2026)?new Date().getMonth():0;
const todayD=new Date();todayD.setHours(0,0,0,0);

function renderTabs(){
  const el=document.getElementById('monthTabs');el.innerHTML='';
  MONTH_TH.forEach((m,i)=>{
    const t=document.createElement('div');
    t.className='mtab'+(i===activeMonth?' active':'');
    t.textContent=m;
    t.onclick=()=>{activeMonth=i;renderTabs();renderCal();};
    el.appendChild(t);
  });
}

function renderCal(){
  const wrap=document.getElementById('calWrap');wrap.innerHTML='';
  const days=yearData[activeMonth];
  const firstDay=days[0].date.getDay();
  const lbl=document.createElement('div');lbl.className='month-label';lbl.textContent=MONTH_FULL[activeMonth]+' 2569';wrap.appendChild(lbl);
  const hdr=document.createElement('div');hdr.className='cal-header';
  DOW_TH.forEach((d,i)=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;if(i===0)el.style.color='#e74c3c';if(i===6)el.style.color='#3498db';hdr.appendChild(el);});
  wrap.appendChild(hdr);
  const grid=document.createElement('div');grid.className='cal-grid';
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-cell empty';e.style.backgroundColor='transparent';grid.appendChild(e);}
  days.forEach(day=>{
    const meta=smeta(day.score);
    const cell=document.createElement('div');
    cell.className='cal-cell';
    cell.style.backgroundColor=meta.bg;
    cell.style.borderColor='transparent';
    if(day.date.getTime()===todayD.getTime()){cell.style.borderColor='#c9a84c';}
    cell.innerHTML='<div class="cal-day" style="color:'+meta.color+'">'+day.d+'</div><div class="cal-score" style="color:'+meta.color+'">'+day.score+'/7</div><div class="cal-bar" style="background:'+meta.color+'"></div>';
    cell.onclick=()=>openPanel(day);
    grid.appendChild(cell);
  });
  wrap.appendChild(grid);
}

let selCell=null;
function openPanel(day){
  if(selCell){selCell.style.borderColor='transparent';selCell.style.boxShadow='';}
  const cells=document.querySelectorAll('#calWrap .cal-cell:not(.empty)');
  selCell=cells[day.d-1];
  if(selCell){selCell.style.borderColor='#ffffff';selCell.style.boxShadow='0 0 0 2px rgba(255,255,255,0.25)';}
  const meta=smeta(day.score);
  const sorted=[...day.aspects].sort((a,b)=>Math.abs(b.score)-Math.abs(a.score)).slice(0,5);
  let aspHtml='';
  sorted.forEach(a=>{
    const pos=a.score>0;
    const icon=pos?'✨':(a.aspect.n==='Opposition'||a.aspect.n==='Square'?'⚡':'〰️');
    const col=pos?'#2ecc71':'#e74c3c';
    const str=a.aspect.strength>0.7?'แม่นมาก':a.aspect.strength>0.4?'ปานกลาง':'อ่อน';
    aspHtml+='<div class="aspect-item"><div class="asp-icon">'+icon+'</div><div class="asp-body"><div class="asp-title" style="color:'+col+'">'+(PICONS[a.transit]||'★')+' '+(PNAMES[a.transit]||a.transit)+' '+(ANAMES[a.aspect.n]||a.aspect.n)+' '+(PICONS[a.natal]||'★')+' '+(PNAMES[a.natal]||a.natal)+'</div><div class="asp-desc">กำลัง: '+str+' · '+(pos?'+ หนุน':'− กดดัน')+' · '+(a.slow?'ดาวช้า (มีผลนาน)':'ดาวเร็ว (มีผลสั้น)')+'</div></div></div>';
  });
  if(!sorted.length) aspHtml='<div class="aspect-item"><div class="asp-icon">🌙</div><div class="asp-body"><div class="asp-title" style="color:#f1c40f">ไม่มี Aspect สำคัญวันนี้</div><div class="asp-desc">ดาวเดินไม่กระทบดวงกำเนิด — พลังงานสงบ</div></div></div>';
  const adv=['หลีกเลี่ยงการเซ็นเอกสาร','พักผ่อนดูแลสุขภาพ','ชะลอการตัดสินใจ','โฟกัสงานที่ค้างอยู่','เหมาะทบทวนและวางแผน','เหมาะนัดประชุมเจรจา','เหมาะนำเสนองาน','เหมาะตัดสินใจสำคัญ','โอกาสทองอย่าปล่อยผ่าน'];
  const advTxt=adv[Math.min(day.score+1,8)]+(day.date.getDay()===1?' (วันจันทร์ — วันเกิด Y)':'');
  document.getElementById('panelContent').innerHTML=
    '<div class="panel-date">'+day.d+' '+MONTH_FULL[day.m]+' 2569</div>'+
    '<div class="panel-weekday">'+DOW_FULL[day.date.getDay()]+'</div>'+
    '<div class="score-display">'+
      '<div class="score-circle" style="color:'+meta.color+';border-color:'+meta.color+';background:'+meta.bg+'">'+
        '<div class="score-num" style="color:'+meta.color+'">'+day.score+'</div>'+
        '<div class="score-max" style="color:'+meta.color+'">/7</div>'+
      '</div>'+
      '<div>'+
        '<div class="score-label" style="color:'+meta.color+'">'+meta.label+'</div>'+
        '<div class="score-desc">'+meta.advice+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="aspect-list">'+aspHtml+'</div>'+
    '<div class="advice-box"><h4>⭐ คำแนะนำ</h4><p>'+advTxt+'</p></div>';
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closePanel(){
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  if(selCell){selCell.style.borderColor='transparent';selCell.style.boxShadow='';selCell=null;}
}

let startY=0;
document.getElementById('detailPanel').addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
document.getElementById('detailPanel').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-startY>60)closePanel();});

renderTabs();
renderCal();
if(new Date().getFullYear()===2026){setTimeout(()=>openPanel(yearData[new Date().getMonth()][new Date().getDate()-1]),700);}
</script>

</body>
</html>
